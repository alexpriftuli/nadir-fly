# nginx — nadir-fly.com
#
# On a server with multiple apps, each domain gets its own server block
# (virtual host), matched by `server_name`. The /api/contact location must sit
# INSIDE the block whose server_name is nadir-fly.com — that's what
# scopes it to this domain and keeps it off the other apps.
#
# ── CASE A: a server block for nadir-fly.com already exists ──
#   (e.g. certbot made one). Just paste the `location = /api/contact { … }`
#   part below into that block, then:  sudo nginx -t && sudo systemctl reload nginx
#
# ── CASE B: no block yet ──
#   Save this whole file as /etc/nginx/sites-available/nadir-fly.com,
#   adjust `root`, symlink it into sites-enabled, reload, then add TLS:
#     sudo ln -s /etc/nginx/sites-available/nadir-fly.com /etc/nginx/sites-enabled/
#     sudo nginx -t && sudo systemctl reload nginx
#     sudo certbot --nginx -d nadir-fly.com   # rewrites this block for HTTPS

server {
    listen 80;
    listen [::]:80;
    server_name nadir-fly.com;

    # static site files — adjust to your actual web root
    root /var/www/solar;
    index index.html;

    # don't cache HTML, so content updates appear on next load
    # (CSS/JS are cache-busted via ?v= in the page <link>/<script>)
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # contact form → local Node service (systemd: nadir-contact, port 3056)
    location = /api/contact {
        limit_except POST { deny all; }        # only POST is allowed
        proxy_pass http://127.0.0.1:3056;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
}
